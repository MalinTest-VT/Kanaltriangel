
<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Kanaltriangel</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
    --tri-scale: 1.25;
    --pill-font: 13px;
    --pill-pad-y: 6px;
    --pill-pad-x: 10px;
    --zone-gap: 8px;
    --card-width: 520px;

    /* Symmetrisk triangel */
    --top-w: 60%;
    --top-h: 28%;
    --top-y: 6%;

    --bottom-w: 40%;
    --bottom-h: 34%;
    --bottom-y: 46%;

    --spread-x: 22%;  /* SPRIDNING FÖR NEDRE TVÅ ZONER */

    /* Färger */
    --zone-top-bg:  #F3FCFF;
    --zone-left-bg: #e9fbf0;
    --zone-right-bg:#eaf1ff;
    --zone-top-border:  #f1c96a;
    --zone-left-border: #78d49a;
    --zone-right-border:#8fb3ff;

    --label-font: 10px;
    --sublabel-font: 8px;
    --label-bg: #ffffff;
}

body {
    font-family: system-ui, Arial, sans-serif;
    margin: 22px;
    background:#f6f7fb;
    color:#111;
}
h1 { margin: 0 0 12px 0; }

button {
    padding:9px 12px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    cursor:pointer;
    background:#111827;
    color:#fff;
}
button.secondary {
    background:#fff;
    color:#111;
}

#controls {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.tri-container { 
    margin-top:20px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    align-items:flex-start;
}

.tri-block {
    background:#fff;
    padding:14px;
    border-radius:14px;
    width:var(--card-width);
    border:1px solid #e5e7ef;
    box-shadow:0 1px 2px #0000000d;
}

.tri-head {
    display:flex;
    gap:8px;
    align-items:center;
}

.title-input {
    flex:1;
    min-width:0;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
}

.remove-btn {
    background:#fee2e2;
    color:#b91c1c;
    border-color:#fecaca;
}

.row {
    display:flex;
    gap:10px;
    align-items:center;
    margin:10px 0;
    flex-wrap:wrap;
}

.bank {
    background:#eef4ff;
    padding:10px;
    border-radius:10px;
    min-height:56px;
    border:1px solid #d6defa;
}

.pill {
    display:inline-block;
    margin:4px;
    padding: var(--pill-pad-y) var(--pill-pad-x);
    font-size: var(--pill-font);
    line-height: 1.25;
    background:#f7f9ff;
    border:1px solid #cbd5ff;
    border-radius:10px;
    cursor:grab;
    user-select:none;
    white-space: normal;
    overflow-wrap: anywhere;
    max-width: 100%;
}

/* TRIANGEL */
.triangle-wrap { width:100%; overflow:visible; }

.triangle {
    position:relative;
    width:100%;
    aspect-ratio: 1 / 0.86;
    transform: scale(var(--tri-scale));
    transform-origin: top center;
    margin-top: calc((var(--tri-scale) - 1) * 8px);
}

.tri-bg {
    position:absolute;
    inset:0;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(180deg, #f9fbff 0%, #f3f7ff 100%);
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.08));
    z-index: 1;
}

/* ZONER – symmetrisk och centrerad layout */
.zone-box {
    position:absolute;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.zone-top {
    top: var(--top-y);
    left: 50%;
    transform: translateX(-50%);
    width: var(--top-w);
    min-height: var(--top-h);
}

.zone-left {
    top: var(--bottom-y);
    left: calc(50% - var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}

.zone-right {
    top: var(--bottom-y);
    left: calc(50% + var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}

/* Rubriker */
.zone-label,
.zone-sub{
    text-align:center;
    display:inline-block;
    max-width:100%;
    background:none;
    border:none;
    padding:0;
    color:#0f172a;
}
.zone-label {
    font-size: var(--label-font);
    font-weight:700;
}
.zone-sub {
    font-size: var(--sublabel-font);
    font-weight:500;
    color:#334155;
}

/* ORDLÅDA */
.zone {
    width:100%;
    flex:1 1 auto;
    min-height:60px;
    border:2px solid #c7d2e5;
    border-radius:12px;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap: var(--zone-gap);
    background:#ffffffd8;
    backdrop-filter:blur(1px);
}

.zone[data-key="top"]  { background: color-mix(in srgb, var(--zone-top-bg) 55%, #fff); border-color: var(--zone-top-border); }
.zone[data-key="left"] { background: color-mix(in srgb, var(--zone-left-bg) 55%, #fff); border-color: var(--zone-left-border); }
.zone[data-key="right"]{ background: color-mix(in srgb, var(--zone-right-bg) 55%, #fff); border-color: var(--zone-right-border); }

.export-box {
    margin-top:18px;
    padding:12px;
    background:#fff;
    border-radius:10px;
    border:1px solid #cbd5e1;
    white-space:pre;
    font-size:13px;
    display:none;
    max-width:100%;
    overflow:auto;
}

@media (max-width: 560px){
    :root {
        --tri-scale: 1.02;
        --pill-font:12px;
        --pill-pad-y:5px;
        --pill-pad-x:9px;
        --card-width:100%;
        --top-w:86%;
        --bottom-w:86%;
        --spread-x:0%;
        --bottom-y:44%;
    }
    .tri-block { width:100%; }
}
</style>
</head>
<body>

<h1>Kanaltriangel</h1>

<div id="controls">
  <button id="addTri">+ Ny triangel</button>
  <button id="exportTri" class="secondary">Exportera alla</button>

  <!-- Textstorlek -->
  <label class="secondary" style="padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1;">
    Textstorlek ord:
    <select id="sizeSelect" style="margin-left:6px;">
      <option value="12">12 px</option>
      <option value="13" selected>13 px</option>
      <option value="14">14 px</option>
      <option value="16">16 px</option>
    </select>
  </label>

  <!-- Triangelstorlek -->
  <label class="secondary" style="padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1;">
    Triangelstorlek:
    <select id="scaleSelect" style="margin-left:6px;">
      <option value="1.05">Liten</option>
      <option value="1.25" selected>Medium</option>
      <option value="1.40">Stor</option>
      <option value="1.60">Extra stor</option>
    </select>
  </label>

  <!-- Autosave -->
  <label class="secondary" style="padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1; display:flex; align-items:center; gap:6px;">
    Autospara (sek):
    <input id="autosaveRange" type="range" min="2" max="25" value="3" step="1">
    <span id="autosaveVal">3s</span>
  </label>

  <button id="clearStorage" class="secondary">Rensa sparat</button>
</div>

<div id="triHolder" class="tri-container"></div>
<pre id="exportBox" class="export-box"></pre>

<script>
/* =======================
   Standardrubriker
   ======================= */
const DEFAULT_LABELS = {
  top:   { title: 'Kanalens roll',    subtitle: 'Syfte & placeringsprincip' },
  left:  { title: 'Aktiveringslogik', subtitle: 'När & hur triggas kanalen?' },
  right: { title: 'Omfattning',       subtitle: 'Detaljnivå & förväntat innehåll' }
};

/* Defaultord som ska finnas i varje NY triangel */
const DEFAULT_WORDS = [
  "Kort och koncist",
  "Fördjupning",
  "Pressmeddelande",
  "Personaliserad",
  "Till ALLA resenärer"
];

let AUTOSAVE_SEC = 3;
let autosaveTimer = null;

const STORAGE_KEY = 'triangle-workshop-state-v3';


/* ========================
   Appstart
   ======================== */
document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('addTri').addEventListener('click', () =>
    createTriangle(DEFAULT_LABELS, true)
  );

  document.getElementById('exportTri').addEventListener('click', exportAll);
  document.getElementById('sizeSelect').addEventListener('change', onSizeChange);
  document.getElementById('scaleSelect').addEventListener('change', onScaleChange);
  document.getElementById('clearStorage').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    alert('Sparad data rensad.');
  });

  const range = document.getElementById('autosaveRange');
  const rangeVal = document.getElementById('autosaveVal');

  range.addEventListener('input', (e) => {
    AUTOSAVE_SEC = parseInt(e.target.value, 10);
    rangeVal.textContent = AUTOSAVE_SEC + 's';
    restartAutosave();
  });

  const restored = restoreAll();
  if (!restored) {
    createTriangle(DEFAULT_LABELS, true); // ENDST FÖRSTA TRIANGELN FÅR DEFAULTORD
  }

  restartAutosave();
});


/* ===========================================================
   Funktion: skapa triangelblock (med val att lägga defaultord)
   =========================================================== */
let triCount = 0;
function createTriangle(labels = DEFAULT_LABELS, addDefaults = true) {
  triCount++;

  const wrapper = document.createElement('div');
  wrapper.className = 'tri-block';
  wrapper.dataset.id = triCount;

  wrapper.innerHTML = `
    <div class="tri-head">
      <input class="title-input" placeholder="Namn på triangel">
      <button class="remove-btn">Ta bort</button>
    </div>

    <div class="row">
      <strong>Ord:</strong>
      <button class="secondary addWordBtn">+ Lägg till ord</button>
      <button class="secondary addBatchBtn">Importera lista</button>
    </div>

    <div class="bank" aria-label="Ordbank"></div>

    <div class="triangle-wrap">
      <div class="triangle">
        <div class="tri-bg"></div>

        <!-- TOP -->
        <div class="zone-box zone-top">
          <span class="zone-label" contenteditable="true">${labels.top.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.top.subtitle}</div>
          <div class="zone" data-key="top"></div>
        </div>

        <!-- LEFT -->
        <div class="zone-box zone-left">
          <span class="zone-label" contenteditable="true">${labels.left.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.left.subtitle}</div>
          <div class="zone" data-key="left"></div>
        </div>

        <!-- RIGHT -->
        <div class="zone-box zone-right">
          <span class="zone-label" contenteditable="true">${labels.right.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.right.subtitle}</div>
          <div class="zone" data-key="right"></div>
        </div>

      </div>
    </div>
  `;

  wrapper.querySelector('.remove-btn').addEventListener('click', () => wrapper.remove());

  wrapper.querySelector('.addWordBtn').addEventListener('click', () => {
    const word = prompt("Ange ord:");
    if (word) addWord(wrapper, word.trim());
  });

  wrapper.querySelector('.addBatchBtn').addEventListener('click', () => {
    const list = prompt("Klistra in ord (ett per rad):");
    if (list) {
      list.split(/\r?\n/).map(s => s.trim()).filter(Boolean)
        .forEach(w => addWord(wrapper, w));
    }
  });

  /* Default-ord endast om man skapar en NY triangel */
  if (addDefaults) {
    DEFAULT_WORDS.forEach(w => addWord(wrapper, w));
  }

  setupDragAndDrop(wrapper);

  document.getElementById('triHolder').appendChild(wrapper);
}

/* ORD */
function makePill(text) {
  const pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = text;
  pill.setAttribute('draggable', true);
  return pill;
}

function addWord(wrapper, text) {
  wrapper.querySelector('.bank').appendChild(makePill(text));
}


/* DRAG & DROP */
function setupDragAndDrop(wrapper) {
  let dragEl = null;

  wrapper.addEventListener('dragstart', e => {
    if (e.target.classList.contains('pill')) {
      dragEl = e.target;
      e.dataTransfer.setData('text/plain', dragEl.textContent);
    }
  });

  wrapper.addEventListener('dragend', () => {
    dragEl = null;
  });

  wrapper.querySelectorAll('.bank, .zone').forEach(area => {
    area.addEventListener('dragover', e => e.preventDefault());
    area.addEventListener('drop', e => {
      e.preventDefault();
      if (dragEl) {
        area.appendChild(dragEl);
        dragEl.style.maxWidth = "100%";
      }
    });
  });
}


/* EXPORT */
function exportAll() {
  const all = collectAllState();
  const box = document.getElementById('exportBox');
  box.textContent = JSON.stringify(all, null, 2);
  box.style.display = 'block';
}


/* UI-ÄNDRINGAR */
function onSizeChange(e) {
  const val = parseInt(e.target.value, 10);
  document.documentElement.style.setProperty('--pill-font', val + 'px');
  const padY = Math.max(4, Math.round(val * 0.45));
  const padX = Math.max(8, Math.round(val * 0.75));
  document.documentElement.style.setProperty('--pill-pad-y', padY + 'px');
  document.documentElement.style.setProperty('--pill-pad-x', padX + 'px');
}
function onScaleChange(e) {
  document.documentElement.style.setProperty('--tri-scale', e.target.value);
}


/* AUTOSPAR */
function restartAutosave() {
  if (autosaveTimer) clearInterval(autosaveTimer);
  autosaveTimer = setInterval(() => {
    const state = collectAllState();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }, AUTOSAVE_SEC * 1000);
}


/* SAMLA / ÅTERSTÄLL */
function collectAllState() {
  const settings = {
    pillFont: getComputedStyle(document.documentElement).getPropertyValue('--pill-font').trim(),
    triScale: getComputedStyle(document.documentElement).getPropertyValue('--tri-scale').trim(),
    autosaveSec: AUTOSAVE_SEC
  };

  const triangles = [];
  document.querySelectorAll('.tri-block').forEach(block => {
    const name = block.querySelector('.title-input').value;
    const triRoot = block.querySelector('.triangle');

    const labels = {
      top: triRoot.querySelector('.zone-top .zone-label').textContent,
      left: triRoot.querySelector('.zone-left .zone-label').textContent,
      right: triRoot.querySelector('.zone-right .zone-label').textContent,
    };
    const sublabels = {
      top: triRoot.querySelector('.zone-top .zone-sub').textContent,
      left: triRoot.querySelector('.zone-left .zone-sub').textContent,
      right: triRoot.querySelector('.zone-right .zone-sub').textContent,
    };

    const bank = [...block.querySelectorAll('.bank .pill')].map(p => p.textContent);

    const zones = {};
    triRoot.querySelectorAll('.zone').forEach(z => {
      const key = z.dataset.key;
      zones[key] = [...z.querySelectorAll('.pill')].map(p => p.textContent);
    });

    triangles.push({ name, labels, sublabels, bank, zones });
  });

  return { settings, triangles };
}


function restoreAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;

    const data = JSON.parse(raw);

    if (data.settings) {
      if (data.settings.pillFont) document.documentElement.style.setProperty('--pill-font', data.settings.pillFont);
      if (data.settings.triScale) document.documentElement.style.setProperty('--tri-scale', data.settings.triScale);
      if (data.settings.autosaveSec) AUTOSAVE_SEC = data.settings.autosaveSec;
    }

    if (Array.isArray(data.triangles)) {
      data.triangles.forEach(t => {
        const labels = {
          top:   { title: t.labels.top,   subtitle: t.sublabels.top },
          left:  { title: t.labels.left,  subtitle: t.sublabels.left },
          right: { title: t.labels.right, subtitle: t.sublabels.right }
        };

        /* Viktigt: lägg INTE till default-ord vid restore */
        createTriangle(labels, false);

        const block = document.querySelector('.tri-block:last-of-type');
        block.querySelector('.title-input').value = t.name || '';

        const bank = block.querySelector('.bank');
        t.bank.forEach(w => bank.appendChild(makePill(w)));

        const triRoot = block.querySelector('.triangle');
        ['top','left','right'].forEach(k => {
          const z = triRoot.querySelector(`.zone[data-key="${k}"]`);
          t.zones[k].forEach(w => z.appendChild(makePill(w)));
        });
      });
    }

    return true;
  } catch (e) {
    console.warn('Unable to restore:', e);
    return false;
  }
}
</script>

</body>
</html>

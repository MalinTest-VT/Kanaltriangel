
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Kanaltrianglar – Västtrafik Workshop</title>

<!-- External JS libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    /* --- Västtrafiks grafiska profil --- */
    :root {
        --blue: #009FE3;
        --dark: #003A5D;
        --light: #F5F5F5;
        --white: #FFFFFF;
        --tooltip-bg: #009FE3;
        --tooltip-text: #FFFFFF;
    }

    body {
        font-family: Arial, sans-serif;
        background: var(--light);
        margin: 0;
        padding: 20px;
        color: var(--dark);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: var(--blue);
        font-weight: 700;
    }

    /* Knapp: skapa ny triangel */
    .new-triangle-btn {
        display: block;
        margin: 20px auto;
        padding: 12px 20px;
        background: var(--blue);
        color: var(--white);
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    /* Triangel wrapper */
    .triangle-wrapper {
        background: var(--white);
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 60px;
        box-shadow: 0 0 10px rgba(0,0,0,0.07);
    }

    /* Titel (redigerbar) */
    .triangle-title-input {
        width: 260px;
        font-size: 20px;
        padding: 6px;
        margin: 0 auto 10px;
        display: block;
        text-align: center;
        color: var(--dark);
        border: 2px solid var(--blue);
        border-radius: 6px;
    }

    /* Triangel layout */
    .triangle-container {
        display: flex;
        gap: 30px;
        justify-content: center;
        margin-top: 10px;
    }

    .triangle-shape {
        position: relative;
        width: 650px;
        height: 600px;
    }

    .triangle {
        width: 0;
        height: 0;
        border-left: 325px solid transparent;
        border-right: 325px solid transparent;
        border-bottom: 560px solid #E1F4FB;
        position: absolute;
        top: 0;
        left: 0;
    }

    /* Zonerytor */
    .zone {
        position: absolute;
        width: 36%;
        min-height: 130px;
        padding: 10px;
        background: rgba(255,255,255,0.95);
        border: 1px solid #CCE7F3;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    .zone-title-container {
        grid-column: span 3;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .zone-title {
        font-weight: bold;
        color: var(--blue);
        text-align: center;
        margin: 0;
        display: inline-block;
    }

    /* ℹ️ icon */
    .info-icon {
        font-size: 15px;
        color: var(--blue);
        cursor: pointer;
        user-select: none;
    }

    /* Tooltip (C2) */
    .tooltip {
        position: absolute;
        background: var(--tooltip-bg);
        color: var(--tooltip-text);
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        max-width: 240px; /* flexibel men med maxbredd */
        z-index: 999;
        display: none;
        line-height: 1.3;
    }

    /* Ord */
    .item {
        background: var(--white);
        border: 1px solid #CCE7F3;
        padding: 4px 5px;
        text-align: center;
        border-radius: 4px;
        font-size: 12px;
        cursor: grab;
        user-select: none;
        color: var(--dark);
    }

    /* Placering av zoner */
    .top { top: 45px; left: 32%; }
    .left { bottom: 60px; left: 5%; }
    .right { bottom: 60px; right: 5%; }

    /* Ordlistan */
    .word-bank {
        margin: 20px auto 0;
        max-width: 650px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    /* Lägg till ord */
    .add-word-container {
        margin: 20px auto;
        text-align: center;
    }

    .add-word-input {
        padding: 6px;
        width: 200px;
        border-radius: 6px;
        border: 1px solid #CCE7F3;
    }

    .add-word-btn {
        padding: 8px 14px;
        background: var(--blue);
        color: var(--white);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-left: 6px;
    }

    /* PDF export-knapp */
    .export-btn {
        background: var(--blue);
        color: var(--white);
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 20px;
    }

</style>
</head>

    
<body>

<h1>Kanaltrianglar – Workshop</h1>

<button class="new-triangle-btn" onclick="createTriangle()">
    ➕ Skapa ny triangel
</button>
    
<button class="new-triangle-btn" onclick="exportAllPDF()">
    📄 Exportera ALLA trianglar som PDF
</button>


<!-- Här hamnar alla trianglar -->
<div id="trianglesContainer"></div>

<!-- Lägg till ord-UI -->
<div class="add-word-container">
    <input id="globalAddWordInput" 
           class="add-word-input" 
           type="text" 
           placeholder="Lägg till ord…" />
    <button class="add-word-btn" onclick="addGlobalWord()">
        Lägg till ord
    </button>
</div>

</body>

    
<!-- Triangelmall – JS kommer att klona denna struktur och fylla med innehåll -->
<template id="triangleTemplate">
    <div class="triangle-wrapper">

        <!-- Redigerbar titel som följer med i PDF -->
        <input class="triangle-title-input"
               placeholder="Ange kanal..." />

        <div class="triangle-container">

            <!-- Triangeln -->
            <div class="triangle-shape">
                <div class="triangle"></div>

                <!-- ZON 1 – Kanalens roll -->
                <div class="zone top">
                    <div class="zone-title-container">
                        <span class="zone-title">Kanalens roll</span>
                        <span class="info-icon"
                              data-tooltip=" Vad är kanalens syfte vid störning? (ex: kritisk info, kontext, beslutshjälp)
Vad är kanalens styrka?
Vad är kanalens svaghet?
">
                            ℹ️
                        </span>
                    </div>
                </div>

                <!-- ZON 2 – Informationsdjup -->
                <div class="zone left">
                    <div class="zone-title-container">
                        <span class="zone-title">Informationsdjup</span>
                        <span class="info-icon"
                              data-tooltip="blablabla">
                            ℹ️
                        </span>
                    </div>
                </div>

                <!-- ZON 3 – Nivå -->
                <div class="zone right">
                    <div class="zone-title-container">
                        <span class="zone-title">Nivå</span>
                        <span class="info-icon"
                              data-tooltip="blablabla">
                            ℹ️
                        </span>
                    </div>
                </div>

            </div> <!-- /triangle-shape -->

        </div> <!-- /triangle-container -->

        <!-- Word bank (ordsamling för drag & drop) -->
        <div class="word-bank"></div>

        <!-- PDF-exportknapp -->
        <div class="controls">
            <button class="export-btn">Exportera som PDF</button>
        </div>

    </div> <!-- /triangle-wrapper -->
</template>

    


<script>
/* -------------------------------------------------------------------
   STANDARDORD PER ZON
------------------------------------------------------------------- */
let baseWordsTop  = ["Primär", "Huvudroll", "Övergripande", "Sammanhang"];
let baseWordsLeft = ["Fördjupning", "Kort", "Kontext", "Detalj", "Fakta"];
let baseWordsRight = ["Akut", "Större", "Mindre", "Kritisk", "Avvikelse"];

/* Globala ord som användaren lagt till */
let globalAddedWords = JSON.parse(localStorage.getItem("globalAddedWords") || "[]");

/* -------------------------------------------------------------------
   SKAPA TRIANGEL
------------------------------------------------------------------- */
let triangleCounter = 0;

function createTriangle() {
    triangleCounter++;

    const template = document.getElementById("triangleTemplate");
    const clone = template.content.cloneNode(true);
    const wrapper = clone.querySelector(".triangle-wrapper");
    wrapper.dataset.id = triangleCounter;

    const bank = clone.querySelector(".word-bank");

    /* Fyll word-banken */
    [...baseWordsTop, ...baseWordsLeft, ...baseWordsRight, ...globalAddedWords].forEach(w => {
        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;
        div.textContent = w;
        bank.appendChild(div);
    });

    /* Exportknapp */
    clone.querySelector(".export-btn").onclick = () => exportPDF(wrapper);

    /* Radera-knapp */
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "🗑️ Radera triangel";
    deleteBtn.style.marginLeft = "10px";
    deleteBtn.style.padding = "10px 16px";
    deleteBtn.style.background = "#d9534f";
    deleteBtn.style.color = "white";
    deleteBtn.style.border = "none";
    deleteBtn.style.borderRadius = "6px";
    deleteBtn.style.cursor = "pointer";
    deleteBtn.onclick = () => deleteTriangle(wrapper);
    clone.querySelector(".controls").appendChild(deleteBtn);

    document.getElementById("trianglesContainer").appendChild(clone);

    /* Aktivera triangeln */
    enableTriangle(wrapper);

    /* Återställ sparad data */
    loadTriangle(wrapper);
}

/* -------------------------------------------------------------------
   RADERA TRIANGEL – med bekräftelse
------------------------------------------------------------------- */
function deleteTriangle(wrapper) {
    const id = wrapper.dataset.id;

    if (!confirm("Är du säker på att du vill radera denna triangel?\n\nAll data raderas permanent.")) {
        return;
    }

    wrapper.remove();
    localStorage.removeItem("triangle_" + id);
}

/* -------------------------------------------------------------------
   AKTIVERA TRIANGELNS FUNKTIONER
------------------------------------------------------------------- */
function enableTriangle(wrapper) {

    /* Drag & drop */
    wrapper.addEventListener("dragstart", e => {
        if (e.target.classList.contains("item")) {
            window.draggedItem = e.target;
            e.dataTransfer.effectAllowed = "move";
        }
    });

    wrapper.addEventListener("dragover", e => {
        if (e.target.closest(".zone") || e.target.closest(".word-bank")) {
            e.preventDefault();
        }
    });

    wrapper.addEventListener("drop", e => {
        const dropZone = e.target.closest(".zone, .word-bank");
        if (!dropZone) return;
        dropZone.appendChild(window.draggedItem);
        saveTriangle(wrapper);
    });

    /* Tooltip-ikoner */
    wrapper.querySelectorAll(".info-icon").forEach(icon => {
        icon.addEventListener("click", e => {
            e.stopPropagation();
            showTooltip(icon, icon.dataset.tooltip, wrapper);
        });
    });
}

/* -------------------------------------------------------------------
   TOOLTIP (C2)
------------------------------------------------------------------- */
let activeTooltip = null;

function showTooltip(icon, text, wrapper) {
    if (activeTooltip) activeTooltip.remove();

    const tooltip = document.createElement("div");
    tooltip.className = "tooltip";
    tooltip.textContent = text;
    wrapper.appendChild(tooltip);

    const rect = icon.getBoundingClientRect();
    const wrapRect = wrapper.getBoundingClientRect();

    tooltip.style.left = (rect.left - wrapRect.left + 18) + "px";
    tooltip.style.top  = (rect.top  - wrapRect.top) + "px";

    tooltip.style.display = "block";
    activeTooltip = tooltip;
}

/* Stäng tooltip vid klick utanför */
document.addEventListener("click", () => {
    if (activeTooltip) {
        activeTooltip.remove();
        activeTooltip = null;
    }
});

/* -------------------------------------------------------------------
   LÄGG TILL GLOBALT ORD
------------------------------------------------------------------- */
function addGlobalWord() {
    const input = document.getElementById("globalAddWordInput");
    const word = input.value.trim();
    if (!word) return;

    globalAddedWords.push(word);
    localStorage.setItem("globalAddedWords", JSON.stringify(globalAddedWords));

    document.querySelectorAll(".word-bank").forEach(bank => {
        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;
        div.textContent = word;
        bank.appendChild(div);
    });

    input.value = "";
}

/* -------------------------------------------------------------------
   AUTOSPAR OCH ÅTERLADDNING
------------------------------------------------------------------- */
function saveTriangle(wrapper) {
    const id = wrapper.dataset.id;

    const state = {
        title: wrapper.querySelector(".triangle-title-input").value,
        top: zoneWords(wrapper, ".zone.top"),
        left: zoneWords(wrapper, ".zone.left"),
        right: zoneWords(wrapper, ".zone.right"),
        bank: zoneWords(wrapper, ".word-bank")
    };

    localStorage.setItem("triangle_" + id, JSON.stringify(state));
}

function loadTriangle(wrapper) {
    const id = wrapper.dataset.id;
    const saved = localStorage.getItem("triangle_" + id);
    if (!saved) return;

    const data = JSON.parse(saved);

    wrapper.querySelector(".triangle-title-input").value = data.title;

    restoreZone(wrapper, ".zone.top", data.top);
    restoreZone(wrapper, ".zone.left", data.left);
    restoreZone(wrapper, ".zone.right", data.right);
    restoreZone(wrapper, ".word-bank", data.bank);
}

function zoneWords(wrapper, sel) {
    return [...wrapper.querySelector(sel).querySelectorAll(".item")]
        .map(i => i.textContent);
}

function restoreZone(wrapper, sel, words) {
    const zone = wrapper.querySelector(sel);
    zone.querySelectorAll(".item").forEach(e => e.remove());

    words.forEach(w => {
        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;
        div.textContent = w;
        zone.appendChild(div);
    });
}

/* -------------------------------------------------------------------
   EXPORTERA EN TRIANGEL TILL PDF
------------------------------------------------------------------- */
async function exportPDF(wrapper) {

    if (activeTooltip) {
        activeTooltip.remove();
        activeTooltip = null;
    }

    const canvas = await html2canvas(wrapper, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jspdf.jsPDF({
        orientation: "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
    });

    pdf.addImage(imgData, "PNG", 0, 0);
    pdf.save("kanaltriangel_" + wrapper.dataset.id + ".pdf");
}

/* -------------------------------------------------------------------
   EXPORTERA ALLA TRIANGELER → EN PDF (en sida per triangel)
------------------------------------------------------------------- */
async function exportAllPDF() {

    if (activeTooltip) {
        activeTooltip.remove();
        activeTooltip = null;
    }

    const pdf = new jspdf.jsPDF({
        orientation: "portrait",
        unit: "px",
        format: "a4"
    });

    const all = [...document.querySelectorAll(".triangle-wrapper")];

    for (let i = 0; i < all.length; i++) {

        const wrapper = all[i];

        // Canvasrendering
        const canvas = await html2canvas(wrapper, { scale: 2 });
        const imgData = canvas.toDataURL("image/png");

        // Skalning till A4
        const pageWidth = pdf.internal.pageSize.getWidth();
        const imgWidth = pageWidth * 0.92;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        if (i !== 0) pdf.addPage();

        pdf.addImage(
            imgData,
            "PNG",
            pageWidth * 0.04,
            20,
            imgWidth,
            imgHeight
        );
    }

    pdf.save("kanaltrianglar.pdf");
}
</script>
</html>

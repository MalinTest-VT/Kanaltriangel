
<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Dynamiska Trianglar – responsiva zoner & underrubriker</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{
    /* Snabba justeringar */
    --tri-scale: 1.25;         /* 1.0 = standard, öka för större triangel */
    --pill-font: 13px;         /* textstorlek för ord */
    --pill-pad-y: 6px;         /* vertikal padding i ord */
    --pill-pad-x: 10px;        /* horisontell padding i ord */
    --zone-gap: 8px;           /* mellanrum mellan ord i en zon */
    --card-width: 480px;       /* kortbredd per triangel */

    /* Geometrin för triangelns indelning (kan justeras fritt) */
    --apex-y: 6%;              /* var “spetsen” för top-zonen börjar (lite ned från toppen för luft) */
    --split-y: 64%;            /* höjden där top-zonen möter bottenzonerna */
    --left-x: 16%;             /* X-koordinat där delningslinjen möter vänster sida */
    --right-x: 84%;            /* X-koordinat där delningslinjen möter höger sida */

    /* Stil för rubriker/underrubriker */
    --label-font: 12px;
    --sublabel-font: 12px;
    --label-bg: #ffffff;
  }

  body { font-family: system-ui, Arial, sans-serif; margin: 22px; background:#f6f7fb; color:#111; }
  h1 { margin: 0 0 12px 0; }
  button { padding:9px 12px; border-radius:8px; border:1px solid #cbd5e1; cursor:pointer; background:#111827; color:#fff; }
  button.secondary { background:#fff; color:#111; }
  #controls { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }

  .tri-container { margin-top:20px; display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  .tri-block { background:#fff; padding:14px; border-radius:14px; width:var(--card-width); border:1px solid #e5e7ef; box-shadow:0 1px 2px #0000000d; }
  .tri-head { display:flex; gap:8px; align-items:center; }
  .title-input { flex:1; min-width:0; padding:8px 10px; border-radius:8px; border:1px solid #cbd5e1; }
  .remove-btn { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }
  .row { display:flex; gap:10px; align-items:center; margin:10px 0; flex-wrap:wrap; }

  /* Ordbank */
  .bank { background:#eef4ff; padding:10px; border-radius:10px; min-height:56px; border:1px solid #d6defa; }
  .pill{
    display:inline-block;
    margin:4px;
    padding: var(--pill-pad-y) var(--pill-pad-x);
    font-size: var(--pill-font);
    line-height: 1.25;
    background:#f7f9ff;
    border:1px solid #cbd5ff;
    border-radius:10px;
    cursor:grab;
    user-select:none;

    /* Visa alltid hela ordet, även långa */
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
    overflow: visible;
    max-width: 100%;
    box-sizing: border-box;
  }

  /* Triangelram och mask */
  .triangle-wrap { width:100%; overflow:visible; }
  .triangle {
    position:relative;
    width:100%;
    aspect-ratio: 1 / 0.86;     /* proportion av en liksidig triangel */
    transform: scale(var(--tri-scale));
    transform-origin: top center;
    margin-top: calc((var(--tri-scale) - 1) * 8px);

    /* Viktigt: Klipp allt innehåll till triangelns form */
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    overflow: hidden;
  }

  /* Bakgrundstriangel (silhuett) med tydlig kant */
  .tri-shape {
    position:absolute;
    inset:0;
    background: #f9fbff;
    border:18px solid #dbe4f4;
    border-radius:10px;
    clip-path: inherit;           /* samma form som container */
    z-index: 1;
  }

  /* Tre zoner som kilar som fyller triangeln */
  .zone {
    position:absolute;
    inset:0;                      /* täck hela containern – klipps av clip-path nedan */
    z-index: 2;
    display:flex;
    flex-wrap:wrap;
    align-content:flex-start;
    gap: var(--zone-gap);
    padding:10px;
    box-sizing: border-box;
    overflow:auto;

    /* diskret bakgrund & kant */
    border:2px solid transparent;
    background-clip: padding-box;
  }

  /* Kilformer: top / left / right */
  .z-top  {
    clip-path: polygon(50% var(--apex-y), var(--right-x) var(--split-y), var(--left-x) var(--split-y));
    background: #fff8e6e6;
    border-color:#f1c96a;
  }
  .z-left {
    clip-path: polygon(0% 100%, 50% 100%, var(--left-x) var(--split-y));
    background: #e9fbf0e6;
    border-color:#78d49a;
  }
  .z-right{
    clip-path: polygon(50% 100%, 100% 100%, var(--right-x) var(--split-y));
    background: #eaf1ffea;
    border-color:#8fb3ff;
  }

  /* Rubriker & underrubriker – placerade inuti triangeln */
  .zone-label,
  .zone-sublabel{
    position:absolute;
    z-index: 3;
    background: var(--label-bg);
    border:1px solid #e2e8f0;
    color:#0f172a;
    border-radius:8px;
    padding:4px 8px;
    white-space:nowrap;
  }
  .zone-label{ font-size: var(--label-font); font-weight:700; }
  .zone-sublabel{ font-size: var(--sublabel-font); font-weight:500; color:#334155; }

  /* Placeringar – justera om du vill */
  .lab-top    { top: calc(var(--apex-y) + 2%);  left:50%; transform:translateX(-50%); }
  .sub-top    { top: calc(var(--apex-y) + 7%);  left:50%; transform:translateX(-50%); }

  .lab-left   { top: calc(var(--split-y) + 3%); left:24%; transform:translateX(-50%); }
  .sub-left   { top: calc(var(--split-y) + 7%); left:24%; transform:translateX(-50%); }

  .lab-right  { top: calc(var(--split-y) + 3%); left:76%; transform:translateX(-50%); }
  .sub-right  { top: calc(var(--split-y) + 7%); left:76%; transform:translateX(-50%); }

  /* Export-låda */
  .export-box { margin-top:18px; padding:12px; background:#fff; border-radius:10px; border:1px solid #cbd5e1; white-space:pre; font-size:13px; display:none; max-width:100%; overflow:auto; }

  /* Responsiv */
  @media (max-width: 560px){
    :root { --tri-scale: 1.05; --pill-font: 12px; --pill-pad-y: 5px; --pill-pad-x: 9px; --card-width: 100%; }
    .tri-block { width: 100%; }
    .zone-label, .zone-sublabel { font-size: 11px; }
  }
</style>
</head>
<body>

<h1>Dynamiska Trianglar – responsiva zoner & underrubriker</h1>
<div id="controls">
  <button id="addTri">+ Ny triangel</button>
  <button id="exportTri" class="secondary">Exportera alla</button>

  <!-- Snabba reglage (frivilliga) -->
  <label class="secondary" style="padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; color:#111;">
    Textstorlek ord:
    <select id="sizeSelect" style="margin-left:6px;">
      <option value="12">12 px</option>
      <option value="13" selected>13 px</option>
      <option value="14">14 px</option>
      <option value="16">16 px</option>
    </select>
  </label>
  <label class="secondary" style="padding:6px 10px; border-radius:8px; border:1px solid #cbd5e1; background:#fff; color:#111;">
    Triangelstorlek:
    <select id="scaleSelect" style="margin-left:6px;">
      <option value="1.10">Liten+</option>
      <option value="1.25" selected>Medium</option>
      <option value="1.40">Stor</option>
      <option value="1.60">Extra stor</option>
    </select>
  </label>
</div>

<div id="triHolder" class="tri-container"></div>
<pre id="exportBox" class="export-box"></pre>

<script>
/* =======================
   Ändra rubriker här 👇
   ======================= */
const DEFAULT_LABELS = {
  top:   { title: 'Kanalens roll',   subtitle: 'Syfte & placeringsprincip' },
  left:  { title: 'Aktiveringslogik', subtitle: 'När & hur triggas kanalen?' },
  right: { title: 'Informationsdjup', subtitle: 'Detaljnivå & förväntat innehåll' }
};

let triCount = 0;

// Skapa en ny triangel
function createTriangle(labels = DEFAULT_LABELS) {
  triCount++;
  const wrapper = document.createElement('div');
  wrapper.className = 'tri-block';
  wrapper.dataset.id = triCount;

  wrapper.innerHTML = `
    <div class="tri-head">
      <input class="title-input" placeholder="Namn på triangel (t.ex. Team Alfa)">
      <button class="remove-btn" title="Ta bort denna triangel">Ta bort</button>
    </div>

    <div class="row">
      <strong>Ord:</strong>
      <button class="secondary addWordBtn" title="Lägg till ett ord">+ Lägg till ord</button>
      <button class="secondary addBatchBtn" title="Klistra in flera ord (ett per rad)">Importera lista</button>
    </div>

    <div class="bank" aria-label="Ordbank"></div>

    <div class="triangle-wrap">
      <div class="triangle" role="group" aria-label="Triangel med tre fält">
        <!-- Bakgrundstriangel -->
        <div class="tri-shape" aria-hidden="true"></div>

        <!-- Tre zoner – kilformade och responsiva -->
        <div class="zone z-top"   data-key="top"   data-zone="${labels.top.title}"   aria-label="${labels.top.title}"></div>
        <div class="zone z-left"  data-key="left"  data-zone="${labels.left.title}"  aria-label="${labels.left.title}"></div>
        <div class="zone z-right" data-key="right" data-zone="${labels.right.title}" aria-label="${labels.right.title}"></div>

        <!-- Rubriker -->
        <span class="zone-label lab-top">${labels.top.title}</span>
        <span class="zone-label lab-left">${labels.left.title}</span>
        <span class="zone-label lab-right">${labels.right.title}</span>

        <!-- Underrubriker -->
        <span class="zone-sublabel sub-top">${labels.top.subtitle}</span>
        <span class="zone-sublabel sub-left">${labels.left.subtitle}</span>
        <span class="zone-sublabel sub-right">${labels.right.subtitle}</span>
      </div>
    </div>
  `;

  // Ta bort triangel
  wrapper.querySelector('.remove-btn').addEventListener('click', () => {
    wrapper.remove();
  });

  // Lägg till ett ord
  wrapper.querySelector('.addWordBtn').addEventListener('click', () => {
    const word = prompt("Ange ord att lägga till:");
    if (!word) return;
    addWord(wrapper, word.trim());
  });

  // Importera flera ord i batch (ett per rad)
  wrapper.querySelector('.addBatchBtn').addEventListener('click', () => {
    const list = prompt("Klistra in ord – ett per rad:");
    if (!list) return;
    list.split(/\r?\n/).map(s => s.trim()).filter(Boolean).forEach(w => addWord(wrapper, w));
  });

  // Dra & släpp
  setupDragAndDrop(wrapper);

  document.getElementById('triHolder').appendChild(wrapper);
}

// Lägg till ett ord i banken
function addWord(wrapper, text) {
  const pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = text;
  pill.setAttribute('draggable', true);
  wrapper.querySelector('.bank').appendChild(pill);
}

// Drag & drop: bank <-> zoner
function setupDragAndDrop(wrapper) {
  let dragEl = null;

  wrapper.addEventListener('dragstart', e => {
    const t = e.target;
    if (t.classList.contains('pill')) {
      dragEl = t;
      // datatransfer krävs i vissa browsers för DnD att fungera
      e.dataTransfer.setData('text/plain', t.textContent);
    }
  });

  wrapper.addEventListener('dragend', () => {
    dragEl = null;
  });

  wrapper.querySelectorAll('.bank, .zone').forEach(area => {
    area.addEventListener('dragover', e => e.preventDefault());
    area.addEventListener('drop', e => {
      e.preventDefault();
      if (dragEl) {
        area.appendChild(dragEl);
        dragEl.style.maxWidth = '100%';
      }
    });
  });
}

// Exportera alla trianglar (JSON)
document.getElementById('exportTri').addEventListener('click', () => {
  const all = [];
  document.querySelectorAll('.tri-block').forEach(block => {
    const name = block.querySelector('.title-input').value || "Namnlös triangel";

    const zones = {};
    block.querySelectorAll('.zone').forEach(z => {
      zones[z.dataset.zone] = [...z.querySelectorAll('.pill')].map(p => p.textContent);
    });

    // ta med rubriker/underrubriker i export
    const labels = {};
    const sublabels = {};
    const root = block.querySelector('.triangle');

    labels['Kanalens roll'] = (root.querySelector('.lab-top')   || {}).textContent || '';
    labels['Aktiveringslogik'] = (root.querySelector('.lab-left')  || {}).textContent || '';
    labels['Informationsdjup'] = (root.querySelector('.lab-right') || {}).textContent || '';

    sublabels['Kanalens roll'] = (root.querySelector('.sub-top')   || {}).textContent || '';
    sublabels['Aktiveringslogik'] = (root.querySelector('.sub-left')  || {}).textContent || '';
    sublabels['Informationsdjup'] = (root.querySelector('.sub-right') || {}).textContent || '';

    const bankWords = [...block.querySelectorAll('.bank .pill')].map(p => p.textContent);

    all.push({ name, bank: bankWords, zones, labels, sublabels });
  });

  const box = document.getElementById('exportBox');
  box.textContent = JSON.stringify(all, null, 2);
  box.style.display = 'block';
});

// UI-kontroller
document.getElementById('addTri').addEventListener('click', () => createTriangle());

// Snabb justering av ordens textstorlek globalt
document.getElementById('sizeSelect').addEventListener('change', (e) => {
  const val = parseInt(e.target.value, 10);
  document.documentElement.style.setProperty('--pill-font', val + 'px');
  const padY = Math.max(4, Math.round(val * 0.45));
  const padX = Math.max(8, Math.round(val * 0.75));
  document.documentElement.style.setProperty('--pill-pad-y', padY + 'px');
  document.documentElement.style.setProperty('--pill-pad-x', padX + 'px');
});

// Justera triangelns skala globalt
document.getElementById('scaleSelect').addEventListener('change', (e) => {
  const scale = e.target.value;
  document.documentElement.style.setProperty('--tri-scale', scale);
});

// Starta med en första triangel
createTriangle();
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Kanaltrianglar – Västtrafik Workshop</title>

<!-- External libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    /* --- Västtrafiks grafiska profil --- */
    :root {
        --blue: #009FE3;
        --dark: #003A5D;
        --light: #F5F5F5;
        --white: #FFFFFF;
    }

    body {
        font-family: Arial, sans-serif;
        background: var(--light);
        margin: 0;
        padding: 20px;
        color: var(--dark);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: var(--blue);
        font-weight: 700;
    }

    .new-triangle-btn {
        display: block;
        margin: 20px auto;
        padding: 12px 20px;
        background: var(--blue);
        color: var(--white);
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }

    .triangle-wrapper {
        background: var(--white);
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 60px;
        box-shadow: 0 0 10px rgba(0,0,0,0.07);
    }

    .triangle-title-input {
        width: 260px;
        font-size: 20px;
        padding: 6px;
        margin: 0 auto 10px;
        display: block;
        text-align: center;
        color: var(--dark);
        border: 2px solid var(--blue);
        border-radius: 6px;
    }

    /* Triangel + zoner */
    .triangle-container {
        display: flex;
        gap: 30px;
        justify-content: center;
        margin-top: 10px;
    }

    .triangle-shape {
        position: relative;
        width: 650px;
        height: 600px;
    }

    .triangle {
        width: 0;
        height: 0;
        border-left: 325px solid transparent;
        border-right: 325px solid transparent;
        border-bottom: 560px solid #E1F4FB;
        position: absolute;
        top: 0;
        left: 0;
    }

    .zone {
        position: absolute;
        width: 36%;
        min-height: 130px;
        padding: 10px;
        background: rgba(255,255,255,0.95);
        border: 1px solid #CCE7F3;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    .zone-title {
        grid-column: span 3;
        text-align: center;
        font-weight: bold;
        color: var(--blue);
        margin-bottom: 6px;
    }

    .item {
        background: var(--white);
        border: 1px solid #CCE7F3;
        padding: 4px 5px;
        text-align: center;
        border-radius: 4px;
        font-size: 12px;
        cursor: grab;
        user-select: none;
        color: var(--dark);
    }

    /* Placering av de tre zonerna */
    .top { top: 45px; left: 32%; }
    .left { bottom: 60px; left: 5%; }
    .right { bottom: 60px; right: 5%; }

    /* --- Förklaringsrutan --- */
    .explain-box {
        width: 260px;
        padding: 15px;
        background: var(--white);
        border: 1px solid #CCE7F3;
        border-radius: 8px;
        color: var(--dark);
        height: fit-content;
        font-size: 13px;
    }

    .explain-box-title {
        font-weight: bold;
        color: var(--blue);
        margin-bottom: 8px;
    }

    /* --- Ordlistan --- */
    .word-bank {
        margin: 20px auto 0;
        max-width: 650px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    /* --- Knappar --- */
    .controls {
        text-align: center;
        margin-top: 20px;
    }

    button.export-btn {
        background: var(--blue);
        color: var(--white);
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Kanaltrianglar – Workshop</h1>

<button class="new-triangle-btn" onclick="createTriangle()">➕ Skapa ny triangel</button>

<div id="trianglesContainer"></div>

<script>
/* -------------------------------------------------------------------
   ORDLISTOR PER ZON
------------------------------------------------------------------- */
const wordsTop = ["Primär", "Huvudroll", "Övergripande", "Sammanhang"];
const wordsLeft = ["Fördjupning", "Kort", "Kontext", "Detalj", "Fakta"];
const wordsRight = ["Akut", "Större", "Mindre", "Kritisk", "Avvikelse"];

/* -------------------------------------------------------------------
   SKAPA TRIANGEL
------------------------------------------------------------------- */
let triangleCount = 0;

function createTriangle() {
    triangleCount++;
    const id = triangleCount;

    const wrapper = document.createElement("div");
    wrapper.className = "triangle-wrapper";
    wrapper.id = `triangle_${id}`;

    wrapper.innerHTML = `
        <input class="triangle-title-input"
               placeholder="Ange kanal..." 
               oninput="saveTriangle(${id})">

        <div class="triangle-container">

            <div class="triangle-shape" id="triangleArea_${id}">
                <div class="triangle"></div>

                <div class="zone top" id="top-zone_${id}">
                    <div class="zone-title">Kanalens roll</div>
                </div>

                <div class="zone left" id="left-zone_${id}">
                    <div class="zone-title">Informationsdjup</div>
                </div>

                <div class="zone right" id="right-zone_${id}">
                    <div class="zone-title">Nivå</div>
                </div>
            </div>

            <div class="explain-box">
                <div class="explain-box-title">Hur ska du tänka?</div>
                blablabla<br><br>
                blablabla<br><br>
                blablabla
            </div>
        </div>

        <div class="word-bank" id="wordbank_${id}"></div>

        <div class="controls">
            <button class="export-btn" onclick="exportPDF(${id})">Exportera som PDF</button>
        </div>
    `;

    document.getElementById("trianglesContainer").appendChild(wrapper);

    populateWordbank(id);
    enableDragAndDrop(id);
    loadTriangle(id);
}

/* -------------------------------------------------------------------
   ORDLISTAN
------------------------------------------------------------------- */
function populateWordbank(id) {
    const bank = document.getElementById(`wordbank_${id}`);

    [...wordsTop, ...wordsLeft, ...wordsRight].forEach(w => {
        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;
        div.textContent = w;
        bank.appendChild(div);
    });
}

/* -------------------------------------------------------------------
   DRAG & DROP
------------------------------------------------------------------- */
function enableDragAndDrop(id) {
    let dragged;

    document.addEventListener("dragstart", e => {
        if (e.target.classList.contains("item")) dragged = e.target;
    });

    document.addEventListener("dragover", e => e.preventDefault());

    document.addEventListener("drop", e => {
        const zones = [
            `top-zone_${id}`,
            `left-zone_${id}`,
            `right-zone_${id}`,
            `wordbank_${id}`
        ];

        for (let zone of zones) {
            const elem = document.getElementById(zone);
            if (elem && (elem.contains(e.target) || e.target.id === zone)) {
                elem.appendChild(dragged);
                saveTriangle(id);
                return;
            }
        }
    });
}

/* -------------------------------------------------------------------
   AUTOSPAR
------------------------------------------------------------------- */
function saveTriangle(id) {
    const data = {
        title: document.querySelector(`#triangle_${id} .triangle-title-input`).value,
        top: zoneArray(`top-zone_${id}`),
        left: zoneArray(`left-zone_${id}`),
        right: zoneArray(`right-zone_${id}`),
        bank: zoneArray(`wordbank_${id}`)
    };

    localStorage.setItem(`triangle_${id}`, JSON.stringify(data));
}

function loadTriangle(id) {
    const saved = localStorage.getItem(`triangle_${id}`);
    if (!saved) return;

    const data = JSON.parse(saved);
    document.querySelector(`#triangle_${id} .triangle-title-input`).value = data.title;

    restore(`top-zone_${id}`, data.top);
    restore(`left-zone_${id}`, data.left);
    restore(`right-zone_${id}`, data.right);
    restore(`wordbank_${id}`, data.bank);
}

function zoneArray(id) {
    return [...document.getElementById(id).querySelectorAll(".item")].map(el => el.textContent);
}

function restore(id, words) {
    const zone = document.getElementById(id);
    zone.querySelectorAll(".item").forEach(e => e.remove());
    words.forEach(w => {
        const div = document.createElement("div");
        div.className = "item";
        div.draggable = true;
        div.textContent = w;
        zone.appendChild(div);
    });
}

/* -------------------------------------------------------------------
   PDF EXPORT (inkl titel)
------------------------------------------------------------------- */
async function exportPDF(id) {
    const element = document.getElementById(`triangle_${id}`);

    const canvas = await html2canvas(element, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jspdf.jsPDF({
        orientation: "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
    });

    pdf.addImage(imgData, "PNG", 0, 0);
    pdf.save(`kanaltriangel_${id}.pdf`);
}
</script>

</body>
</html>

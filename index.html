
<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Kanaltriangel</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
    --tri-scale: 1.25;
    --pill-font: 13px;
    --pill-pad-y: 6px;
    --pill-pad-x: 10px;
    --zone-gap: 8px;
    --card-width: 520px;

    /* Symmetrisk triangel */
    --top-w: 60%;
    --top-h: 28%;
    --top-y: 6%;

    --bottom-w: 40%;
    --bottom-h: 34%;
    --bottom-y: 46%;

    --spread-x: 22%;

    --zone-top-bg:  #0079B4;
    --zone-left-bg: #e9fbf0;
    --zone-right-bg:#eaf1ff;
    --zone-top-border:  #0079B4;
    --zone-left-border: #78d49a;
    --zone-right-border:#8fb3ff;

    --label-font: 10px;
    --sublabel-font: 8px;
}

body {
    font-family: system-ui, Arial, sans-serif;
    margin: 22px;
    background:#f6f7fb;
    color:#111;
}
h1 { margin: 0 0 12px 0; }

button {
    padding:9px 12px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    cursor:pointer;
    background:#111827;
    color:#fff;
}
button.secondary {
    background:#fff;
    color:#111;
}

#controls {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.tri-container { 
    margin-top:20px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    align-items:flex-start;
}

.tri-block {
    background:#fff;
    padding:14px;
    border-radius:14px;
    width:var(--card-width);
    border:1px solid #e5e7ef;
    box-shadow:0 1px 2px #0000000d;
}

.tri-head {
    display:flex;
    flex-direction:column;
    gap:6px;
}

/* VISUELL RUBRIK: placerad PRECIS ovanför triangelns spets (B2) */
.tri-title-above {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
    text-align: center;
    min-height: 1.2em;   /* undvik layout-hopp innan text skrivs */
    margin-bottom: 6px;  /* lite luft ner till triangeln */
}

.title-input {
    padding:8px 10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
}

.remove-btn {
    background:#fee2e2;
    color:#b91c1c;
    border-color:#fecaca;
    margin-top:6px;
}

.row {
    display:flex;
    gap:10px;
    align-items:center;
    margin:10px 0;
    flex-wrap:wrap;
}

.bank {
    background:#eef4ff;
    padding:10px;
    border-radius:10px;
    min-height:56px;
    border:1px solid #d6defa;
}

.pill {
    display:inline-block;
    margin:4px;
    padding: var(--pill-pad-y) var(--pill-pad-x);
    font-size: var(--pill-font);
    background:#f7f9ff;
    border:1px solid #cbd5ff;
    border-radius:10px;
    cursor:grab;
    user-select:none;
    overflow-wrap: anywhere;
}

/* TRIANGEL */
.triangle-wrap { width:100%; overflow:visible; }

.triangle {
    position:relative;
    width:100%;
    aspect-ratio: 1 / 0.86;
    transform: scale(var(--tri-scale));
    transform-origin: top center;
    margin-top: calc((var(--tri-scale) - 1) * 8px);
}

.tri-bg {
    position:absolute;
    inset:0;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(180deg, #f9fbff 0%, #f3f7ff 100%);
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.08));
    z-index: 1;
}

.zone-box {
    position:absolute;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
}

.zone-top {
    top: var(--top-y);
    left: 50%;
    transform: translateX(-50%);
    width: var(--top-w);
    min-height: var(--top-h);
}

.zone-left {
    top: var(--bottom-y);
    left: calc(50% - var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}

.zone-right {
    top: var(--bottom-y);
    left: calc(50% + var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}

.zone-label,
.zone-sub{
    text-align:center;
    background:none;
    padding:0;
    color:#0f172a;
}
.zone-label {
    font-size: var(--label-font);
    font-weight:700;
}
.zone-sub {
    font-size: var(--sublabel-font);
    font-weight:500;
    color:#334155;
}

.zone {
    width:100%;
    flex:1 1 auto;
    min-height:60px;
    border:2px solid #c7d2e5;
    border-radius:12px;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap: var(--zone-gap);
    background:#ffffffd8;
}

.zone[data-key="top"]  { background: color-mix(in srgb, var(--zone-top-bg) 55%, #fff); border-color: var(--zone-top-border); }
.zone[data-key="left"] { background: color-mix(in srgb, var(--zone-left-bg) 55%, #fff); border-color: var(--zone-left-border); }
.zone[data-key="right"]{ background: color-mix(in srgb, var(--zone-right-bg) 55%, #fff); border-color: var(--zone-right-border); }

.export-box {
    margin-top:18px;
    padding:12px;
    background:#fff;
    border-radius:10px;
    border:1px solid #cbd5e1;
    white-space:pre;
    font-size:13px;
    display:none;
    max-width:100%;
    overflow:auto;
}
</style>
</head>
<body>

<h1>Kanaltriangel</h1>

<div id="controls">
  <button id="addTri">+ Ny triangel</button>
  <button id="exportPdfEach">Exportera PDF (en fil per triangel)</button>
  <button id="exportTri" class="secondary">Exportera JSON</button>

  <label class="secondary" style="padding:6px 10px;">
    Textstorlek ord:
    <select id="sizeSelect">
      <option value="12">12 px</option>
      <option value="13" selected>13 px</option>
      <option value="14">14 px</option>
      <option value="16">16 px</option>
    </select>
  </label>

  <label class="secondary" style="padding:6px 10px;">
    Triangelstorlek:
    <select id="scaleSelect">
      <option value="1.05">Liten</option>
      <option value="1.25" selected>Medium</option>
      <option value="1.40">Stor</option>
      <option value="1.60">Extra stor</option>
    </select>
  </label>

  <label class="secondary" style="padding:6px 10px; display:flex; align-items:center; gap:6px;">
    Autospara (sek):
    <input id="autosaveRange" type="range" min="2" max="25" value="3">
    <span id="autosaveVal">3s</span>
  </label>

  <button id="clearStorage" class="secondary">Rensa sparat</button>
</div>

<div id="triHolder" class="tri-container"></div>
<pre id="exportBox" class="export-box"></pre>

<!-- PDF dependencies -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
const DEFAULT_LABELS = {
  top:   { title: 'Kanalens roll',    subtitle: 'Vad är kanalens syfte vid störning?' },
  left:  { title: 'Aktiveringslogik', subtitle: 'När & hur triggas kanalen?' },
  right: { title: 'Omfattning och informationsdjup',       subtitle: 'Vilken typ av info kan kanalen bära?' }
};

const DEFAULT_WORDS = [
  "Kort och koncist",
  "Fördjupning",
  "Pressmeddelande",
  "Personaliserad",
    "Omedelbar status"
  "Till ALLA resenärer"
"Automatiskt"
    "Manuellt"
    "Allvarliga störningar"
    "Medelstora störningar"
    "Små störningar"
    "Inget personligt"
    "Starkt reducerad info"
    "Fullständig info"
    "Bakgrund och orsaker"
];

let AUTOSAVE_SEC = 3;
let autosaveTimer = null;

const STORAGE_KEY = 'triangle-workshop-state-v6';

document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('addTri').addEventListener('click', () =>
    createTriangle(DEFAULT_LABELS, true)
  );

  document.getElementById('exportTri').addEventListener('click', exportAllJSON);
  document.getElementById('exportPdfEach').addEventListener('click', exportPdfsPerTriangle);

  document.getElementById('sizeSelect').addEventListener('change', onSizeChange);
  document.getElementById('scaleSelect').addEventListener('change', onScaleChange);

  document.getElementById('clearStorage').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    alert('Sparad data rensad.');
  });

  const range = document.getElementById('autosaveRange');
  const rangeVal = document.getElementById('autosaveVal');
  range.addEventListener('input', (e) => {
    AUTOSAVE_SEC = parseInt(e.target.value);
    rangeVal.textContent = AUTOSAVE_SEC + 's';
    restartAutosave();
  });

  const restored = restoreAll();
  if (!restored) {
    createTriangle(DEFAULT_LABELS, true);
  }

  restartAutosave();
});

/* SKAPA TRIANGEL */
let triCount = 0;
function createTriangle(labels = DEFAULT_LABELS, addDefaults = true) {
  triCount++;

  const wrapper = document.createElement('div');
  wrapper.className = 'tri-block';

  wrapper.innerHTML = `
    <div class="tri-head">
      <input class="title-input" placeholder="Namn på triangel">
      <button class="remove-btn">Ta bort</button>
    </div>

    <div class="row">
      <strong>Ord:</strong>
      <button class="secondary addWordBtn">+ Lägg till ord</button>
      <button class="secondary addBatchBtn">Importera lista</button>
    </div>

    <div class="bank"></div>

    <div class="triangle-wrap">
      <!-- VISUELL RUBRIK: precis ovanför triangeln (B2) -->
      <div class="tri-title-above"></div>

      <div class="triangle">
        <div class="tri-bg"></div>

        <div class="zone-box zone-top">
          <span class="zone-label" contenteditable="true">${labels.top.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.top.subtitle}</div>
          <div class="zone" data-key="top"></div>
        </div>

        <div class="zone-box zone-left">
          <span class="zone-label" contenteditable="true">${labels.left.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.left.subtitle}</div>
          <div class="zone" data-key="left"></div>
        </div>

        <div class="zone-box zone-right">
          <span class="zone-label" contenteditable="true">${labels.right.title}</span>
          <div class="zone-sub" contenteditable="true">${labels.right.subtitle}</div>
          <div class="zone" data-key="right"></div>
        </div>

      </div>
    </div>
  `;

  const titleInput = wrapper.querySelector('.title-input');
  const titleAbove = wrapper.querySelector('.tri-title-above');

  // Live-uppdatera visuell rubrik
  titleInput.addEventListener('input', () => {
    titleAbove.textContent = titleInput.value.trim();
  });

  if (addDefaults) {
    DEFAULT_WORDS.forEach(w => addWord(wrapper, w));
  }

  wrapper.querySelector('.remove-btn').addEventListener('click', () => wrapper.remove());
  wrapper.querySelector('.addWordBtn').addEventListener('click', () => {
    const word = prompt("Ange ord:");
    if (word) addWord(wrapper, word.trim());
  });
  wrapper.querySelector('.addBatchBtn').addEventListener('click', () => {
    const list = prompt("Klistra in ord (ett per rad):");
    if (list) list.split(/\r?\n/).map(s => s.trim()).filter(Boolean).forEach(w => addWord(wrapper, w));
  });

  setupDragAndDrop(wrapper);
  document.getElementById('triHolder').appendChild(wrapper);
}

/* PILL */
function makePill(text) {
  const pill = document.createElement('span');
  pill.className = 'pill';
  pill.textContent = text;
  pill.setAttribute('draggable', true);
  return pill;
}
function addWord(wrapper, text) {
  wrapper.querySelector('.bank').appendChild(makePill(text));
}

/* DRAG & DROP */
function setupDragAndDrop(wrapper) {
  let dragEl = null;

  wrapper.addEventListener('dragstart', e => {
    if (e.target.classList.contains('pill')) {
      dragEl = e.target;
      e.dataTransfer.setData('text/plain', dragEl.textContent);
    }
  });
  wrapper.addEventListener('dragend', () => dragEl = null);

  wrapper.querySelectorAll('.bank, .zone').forEach(area => {
    area.addEventListener('dragover', e => e.preventDefault());
    area.addEventListener('drop', e => {
      e.preventDefault();
      if (dragEl) area.appendChild(dragEl);
    });
  });
}

/* JSON-EXPORT */
function exportAllJSON() {
  const all = collectAllState();
  const box = document.getElementById('exportBox');
  box.textContent = JSON.stringify(all, null, 2);
  box.style.display = 'block';
}

/* UI */
function onSizeChange(e) {
  const val = parseInt(e.target.value);
  document.documentElement.style.setProperty('--pill-font', val + 'px');
}
function onScaleChange(e) {
  document.documentElement.style.setProperty('--tri-scale', e.target.value);
}

/* AUTOSAVE */
function restartAutosave() {
  if (autosaveTimer) clearInterval(autosaveTimer);
  autosaveTimer = setInterval(() => {
    const state = collectAllState();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }, AUTOSAVE_SEC * 1000);
}

/* STATE */
function collectAllState() {
  const triangles = [];
  document.querySelectorAll('.tri-block').forEach(block => {
    const title = block.querySelector('.title-input').value || '';
    const triRoot = block.querySelector('.triangle');

    const labels = {
      top: triRoot.querySelector('.zone-top .zone-label').textContent,
      left: triRoot.querySelector('.zone-left .zone-label').textContent,
      right: triRoot.querySelector('.zone-right .zone-label').textContent
    };
    const sublabels = {
      top: triRoot.querySelector('.zone-top .zone-sub').textContent,
      left: triRoot.querySelector('.zone-left .zone-sub').textContent,
      right: triRoot.querySelector('.zone-right .zone-sub').textContent
    };

    const bank = [...block.querySelectorAll('.bank .pill')].map(p => p.textContent);

    const zones = {};
    triRoot.querySelectorAll('.zone').forEach(z => {
      zones[z.dataset.key] = [...z.querySelectorAll('.pill')].map(p => p.textContent);
    });

    triangles.push({ name: title, labels, sublabels, bank, zones });
  });

  return { triangles };
}

function restoreAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;

    const data = JSON.parse(raw);
    if (!Array.isArray(data.triangles)) return false;

    data.triangles.forEach(t => {
      createTriangle(DEFAULT_LABELS, false);

      const block = document.querySelector('.tri-block:last-of-type');
      block.querySelector('.title-input').value = t.name || '';
      block.querySelector('.tri-title-above').textContent = t.name || '';

      const bank = block.querySelector('.bank');
      (t.bank || []).forEach(w => bank.appendChild(makePill(w)));

      const triRoot = block.querySelector('.triangle');
      ['top','left','right'].forEach(k => {
        const lbl = triRoot.querySelector(`.zone-${k} .zone-label`);
        const sub = triRoot.querySelector(`.zone-${k} .zone-sub`);
        if (lbl) lbl.textContent = t.labels?.[k] || '';
        if (sub) sub.textContent = t.sublabels?.[k] || '';

        const zone = triRoot.querySelector(`.zone[data-key="${k}"]`);
        (t.zones?.[k] || []).forEach(w => zone.appendChild(makePill(w)));
      });
    });

    return true;
  } catch (e) {
    console.warn("Restore failed:", e);
    return false;
  }
}

/* ---------- PDF (en fil per triangel) ---------- */
async function exportPdfsPerTriangle() {
  const blocks = [...document.querySelectorAll('.tri-block')];
  if (blocks.length === 0) {
    alert('Det finns inga trianglar att exportera.');
    return;
  }

  const { jsPDF } = window.jspdf;

  for (let i = 0; i < blocks.length; i++) {
    const block = blocks[i];

    const title = (block.querySelector('.title-input').value || `Triangel ${i+1}`).trim();
    const triangleEl = block.querySelector('.triangle');

    // Rendera triangeln som bild (pixel-perfekt)
    const canvas = await html2canvas(triangleEl, {
      backgroundColor: '#ffffff',
      scale: Math.max(2, Math.floor(window.devicePixelRatio || 2))
    });
    const imgData = canvas.toDataURL('image/png');

    // Skapa PDF (A4, porträtt)
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();

    const margin = 36;           // 0.5 inch
    const titleSize = 20;
    const lineGap = 8;

    // Skriv rubrik (över triangeln)
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(titleSize);

    // Hantera långa rubriker snyggt (radbryt)
    const textMaxWidth = pageW - margin * 2;
    const lines = pdf.splitTextToSize(title, textMaxWidth);
    let y = margin + titleSize;
    pdf.text(lines, margin, y);

    // Avstånd till bild
    y += lineGap;

    // Räkna ut storlek på bild för att passa sidan
    const imgW = canvas.width;
    const imgH = canvas.height;
    const availW = pageW - margin * 2;
    const availH = pageH - y - margin;

    const scale = Math.min(availW / imgW, availH / imgH);
    const drawW = imgW * scale;
    const drawH = imgH * scale;

    pdf.addImage(imgData, 'PNG', margin, y, drawW, drawH);

    // Spara fil – slugga filnamn
    const fileName = slugify(title || `Triangel ${i+1}`) + '.pdf';
    pdf.save(fileName);
  }
}

function slugify(str) {
  return (str || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)+/g, '')
    || 'triangel';
}
</script>

</body>
</html>

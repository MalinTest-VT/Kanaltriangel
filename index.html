
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Kanaltriangel – Workshop</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #fafafa;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    /* Triangel-container */
    .triangle-container {
        position: relative;
        width: 600px;
        margin: 40px auto;
    }

    /* Själva triangeln */
    .triangle {
        width: 0;
        height: 0;
        border-left: 300px solid transparent;
        border-right: 300px solid transparent;
        border-bottom: 520px solid #e6e6e6;
        margin: 0 auto;
        position: relative;
    }

    /* Zonernas placeringsytor */
    .zone {
        position: absolute;
        width: 40%;
        min-height: 120px;
        padding: 10px;
        background: rgba(255,255,255,0.8);
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    #top-zone {
        top: 40px;
        left: 30%;
        text-align: center;
    }

    #left-zone {
        bottom: 40px;
        left: 5%;
    }

    #right-zone {
        bottom: 40px;
        right: 5%;
    }

    .zone-title {
        font-weight: bold;
        margin-bottom: 6px;
    }

    /* Lappar/ord */
    .item {
        background: #ffffff;
        border: 1px solid #aaa;
        padding: 6px 10px;
        margin: 6px 0;
        border-radius: 5px;
        cursor: grab;
    }

    .item:active {
        cursor: grabbing;
    }

    /* Lägg-till-ord */
    .add-word {
        text-align: center;
        margin-top: 30px;
    }

    input[type="text"] {
        padding: 6px;
        width: 200px;
    }

    button {
        padding: 6px 12px;
        margin-left: 6px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>Kanaltriangel – Workshop</h1>

<div class="triangle-container">
    <div class="triangle"></div>

    <!-- Övre zon -->
    <div class="zone" id="top-zone">
        <div class="zone-title">Kanalens roll</div>
    </div>

    <!-- Vänster zon -->
    <div class="zone" id="left-zone">
        <div class="zone-title">Informationsdjup</div>
    </div>

    <!-- Höger zon -->
    <div class="zone" id="right-zone">
        <div class="zone-title">Nivå</div>
    </div>
</div>

<!-- Lägg till egna ord -->
<div class="add-word">
    <input id="newWordInput" type="text" placeholder="Lägg till ord…" />
    <button onclick="addNewWord()">Lägg till</button>
</div>

<script>
/* -----------------------------
   Fördefinierade ord
   ----------------------------- */

const predefinedWords = [
    "Akut", "Mindre störning", "Fördjupning", "Snabbinfo",
    "Kritisk info", "Översikt", "Varning", "Sammanhang"
];

/* Rendera startlapparna bara om de inte redan finns i localStorage */
function initializeWords() {
    let saved = localStorage.getItem("triangleState");
    if (!saved) {
        predefinedWords.forEach(word => {
            createItemElement(word, document.body);
        });
    } else {
        loadFromStorage();
    }
}

/* -----------------------------
   Drag & Drop-logik
   ----------------------------- */

let draggedItem = null;

document.addEventListener("dragstart", e => {
    if (e.target.classList.contains("item")) {
        draggedItem = e.target;
    }
});

document.addEventListener("dragover", e => {
    e.preventDefault();
});

document.addEventListener("drop", e => {
    if (e.target.classList.contains("zone") || e.target.classList.contains("zone-title")) {
        let zone = e.target.classList.contains("zone") ? e.target : e.target.parentElement;
        zone.appendChild(draggedItem);
        saveToStorage();
    }
});

/* -----------------------------
   Skapa lappar
   ----------------------------- */

function createItemElement(text, parent) {
    let div = document.createElement("div");
    div.className = "item";
    div.draggable = true;
    div.textContent = text;
    parent.appendChild(div);
}

/* -----------------------------
   Lägg till nytt ord
   ----------------------------- */

function addNewWord() {
    let input = document.getElementById("newWordInput");
    let text = input.value.trim();
    if (!text) return;
    createItemElement(text, document.body);
    input.value = "";
    saveToStorage();
}

/* -----------------------------
   Autospar med localStorage
   ----------------------------- */

function saveToStorage() {
    let zones = {
        top: zoneToArray("top-zone"),
        left: zoneToArray("left-zone"),
        right: zoneToArray("right-zone"),
        loose: getLooseItems()
    };
    localStorage.setItem("triangleState", JSON.stringify(zones));
}

function loadFromStorage() {
    let zones = JSON.parse(localStorage.getItem("triangleState"));
    ["top", "left", "right"].forEach(id => {
        let zoneId = id + "-zone";
        zones[id].forEach(word => createItemElement(word, document.getElementById(zoneId)));
    });
    zones.loose.forEach(word => createItemElement(word, document.body));
}

function zoneToArray(zoneId) {
    return [...document.getElementById(zoneId).querySelectorAll(".item")].map(i => i.textContent);
}

function getLooseItems() {
    return [...document.body.querySelectorAll(".item")]
        .filter(el => !el.closest(".zone"))
        .map(el => el.textContent);
}

/* Initiera sidan */
initializeWords();
</script>

</body>
</html>


<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Kanaltriangel – Workshop</title>

<!-- jsPDF + html2canvas för PDF-export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #fafafa;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 20px;
        color: #333;
    }

    .triangle-container {
        position: relative;
        width: 650px;
        margin: 0 auto;
    }

    .triangle {
        width: 0;
        height: 0;
        border-left: 325px solid transparent;
        border-right: 325px solid transparent;
        border-bottom: 560px solid #e6e6e6;
        position: relative;
    }

    .zone {
        position: absolute;
        width: 38%;
        min-height: 120px;
        padding: 10px;
        background: rgba(255,255,255,0.85);
        border: 1px solid #ccc;
        border-radius: 8px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
    }

    #top-zone {
        top: 40px;
        left: 31%;
        width: 38%;
        text-align: center;
    }

    #left-zone {
        bottom: 50px;
        left: 5%;
    }

    #right-zone {
        bottom: 50px;
        right: 5%;
    }

    .zone-title {
        grid-column: span 3;
        text-align: center;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .item {
        background: #ffffff;
        border: 1px solid #aaa;
        padding: 4px;
        text-align: center;
        border-radius: 4px;
        font-size: 12px;
        cursor: grab;
        user-select: none;
    }

    .controls {
        text-align: center;
        margin-top: 25px;
    }

    input[type="text"] {
        padding: 6px;
        width: 200px;
    }

    button {
        padding: 8px 14px;
        margin-left: 6px;
        cursor: pointer;
    }
</style>

</head>
<body>

<h1>Kanaltriangel</h1>
<h2 id="triangleTitle">Webb</h2>

<div id="triangleArea">

    <div class="triangle-container">
        <div class="triangle"></div>

        <div class="zone" id="top-zone">
            <div class="zone-title">Kanalens roll</div>
        </div>

        <div class="zone" id="left-zone">
            <div class="zone-title">Informationsdjup</div>
        </div>

        <div class="zone" id="right-zone">
            <div class="zone-title">Nivå</div>
        </div>
    </div>

</div>

<div class="controls">
    <input id="newWordInput" type="text" placeholder="Lägg till ord…" />
    <button onclick="addNewWord()">Lägg till</button>
    <button onclick="exportPDF()">Exportera som PDF</button>
</div>

<script>
/* -----------------------------
   Fördefinierade ord
   ----------------------------- */

const predefinedWords = [
    "Akut", "Mindre", "Större", "Kritisk",
    "Fördjupning", "Översikt", "Kontext",
    "Varning", "Snabbinfo", "Resenärsnytta"
];

/* -----------------------------
   Startfunktion
   ----------------------------- */

function initializeWords() {
    let saved = localStorage.getItem("triangleState");

    if (!saved) {
        predefinedWords.forEach(word => {
            createItem(word, document.body);
        });
    } else {
        loadFromStorage();
    }
}

/* -----------------------------
   Skapa ord-lappar
   ----------------------------- */

function createItem(text, parent) {
    let div = document.createElement("div");
    div.className = "item";
    div.draggable = true;
    div.textContent = text;
    parent.appendChild(div);
}

/* -----------------------------
   Drag & drop
   ----------------------------- */

let draggedItem = null;

document.addEventListener("dragstart", e => {
    if (e.target.classList.contains("item")) {
        draggedItem = e.target;
    }
});

document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
    if (e.target.classList.contains("zone") ||
        e.target.classList.contains("triangle") ||
        e.target.classList.contains("zone-title")) {

        let zone = null;

        if (e.target.classList.contains("zone")) zone = e.target;
        if (e.target.classList.contains("zone-title")) zone = e.target.parentElement;
        if (e.target.classList.contains("triangle")) zone = document.body;

        zone.appendChild(draggedItem);
        saveToStorage();
    }
});

/* -----------------------------
   Lägg till nytt ord
   ----------------------------- */

function addNewWord() {
    let input = document.getElementById("newWordInput");
    let text = input.value.trim();
    if (!text) return;

    createItem(text, document.body);
    input.value = "";
    saveToStorage();
}

/* -----------------------------
   localStorage
   ----------------------------- */

function saveToStorage() {
    let zones = {
        top: zoneToArray("top-zone"),
        left: zoneToArray("left-zone"),
        right: zoneToArray("right-zone"),
        loose: getLooseItems()
    };
    localStorage.setItem("triangleState", JSON.stringify(zones));
}

function loadFromStorage() {
    let zones = JSON.parse(localStorage.getItem("triangleState"));
    ["top", "left", "right"].forEach(id => {
        let zoneId = id + "-zone";
        zones[id].forEach(word => createItem(word, document.getElementById(zoneId)));
    });
    zones.loose.forEach(word => createItem(word, document.body));
}

function zoneToArray(zoneId) {
    return [...document.getElementById(zoneId).querySelectorAll(".item")].map(i => i.textContent);
}

function getLooseItems() {
    return [...document.body.querySelectorAll(".item")]
        .filter(el => !el.closest(".zone"))
        .map(el => el.textContent);
}

/* -----------------------------
   Exportera PDF lokalt
   ----------------------------- */

async function exportPDF() {
    const element = document.getElementById("triangleArea");

    const canvas = await html2canvas(element, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jspdf.jsPDF({
        orientation: "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
    });

    pdf.addImage(imgData, "PNG", 0, 0);
    pdf.save("kanaltriangel.pdf");
}

/* Init */
initializeWords();
</script>

</body>
</html>

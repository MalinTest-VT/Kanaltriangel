
<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<title>Kanaltriangel – Workshop</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- PDF dependencies -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
/* ======== ROOT VARIABLER ======== */
:root{
    --tri-scale: 1.18;
    --pill-font: 13px;
    --pill-pad-y: 6px;
    --pill-pad-x: 10px;
    --zone-gap: 8px;

    --safe-top: 6%;
    --safe-side: 6%;
    --safe-bottom: 8%;

    /* Triangelplaceringar */
    --top-w: 60%;
    --top-h: 28%;
    --top-y: 6%;

    --bottom-w: 40%;
    --bottom-h: 34%;
    --bottom-y: 46%;
    --spread-x: 22%;

    --label-font: 10px;
    --sublabel-font: 9px;

    --panel-width: 400px;
}

/* ======== PAGE LAYOUT ======== */
body {
    font-family: system-ui, Arial, sans-serif;
    margin: 0;
    background:#f6f7fb;
}
h1 { margin: 20px; }

/* Vänster kolumn = trianglar */
#mainArea {
    margin-right: var(--panel-width);
    padding: 20px;
}

/* Fast ordpanel höger */
#wordPanel {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--panel-width);
    height: 100vh;
    background: #ffffff;
    border-left: 1px solid #dce0ed;
    box-shadow: -2px 0 6px rgba(0,0,0,0.06);
    padding: 20px;
    overflow-y: auto;
}

#panelTitle {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 10px;
}
#panelWords {
    min-height: 100px;
    background:#eef4ff;
    border: 1px solid #cbd5ff;
    border-radius: 10px;
    padding: 10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

/* ======== Triangelblock vänster ======== */
.tri-block {
    background:#fff;
    padding:14px;
    border-radius:14px;
    width: 580px;
    border:1px solid #e5e7ef;
    box-shadow:0 1px 2px #0001;
    margin-bottom: 24px;
}

.title-input {
    width: 100%;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid #cbd5e1;
    margin-bottom:8px;
}

/* Rubrik direkt ovanför triangeln (B2) */
.tri-title-above {
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
    text-align: center;
    min-height: 1.2em;
    margin-bottom: 6px;
}

/* ======== PILLS ======== */
.pill {
    display:inline-block;
    padding: var(--pill-pad-y) var(--pill-pad-x);
    font-size: var(--pill-font);
    background:#f7f9ff;
    border:1px solid #cbd5ff;
    border-radius:10px;
    cursor:grab;
    user-select:none;
    word-break: break-word;
}

/* ======== TRIANGLE ======== */
.triangle-wrap {
    width:100%;
    overflow:visible;
    margin-top: 6px;
}

.triangle {
    position:relative;
    width:100%;
    aspect-ratio: 1 / 0.86;
    transform: scale(var(--tri-scale));
    transform-origin: top center;
}

.tri-bg {
    position:absolute;
    inset:0;
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(180deg, #f9fbff 0%, #f3f7ff 100%);
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.08));
    z-index: 1;
}

/* ======== Zone-boxar ======== */
.zone-box {
    position:absolute;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
}

.zone-top {
    top: var(--top-y);
    left: 50%;
    transform: translateX(-50%);
    width: var(--top-w);
    min-height: var(--top-h);
}
.zone-left {
    top: var(--bottom-y);
    left: calc(50% - var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}
.zone-right {
    top: var(--bottom-y);
    left: calc(50% + var(--spread-x));
    transform: translateX(-50%);
    width: var(--bottom-w);
    min-height: var(--bottom-h);
}

/* Rubriker */
.zone-label {
    font-size: var(--label-font);
    font-weight:700;
}
.zone-sub {
    font-size: var(--sublabel-font);
    font-weight:500;
    color:#334155;
    min-height: 1em;
}

/* Zone-låda */
.zone {
    width:100%;
    min-height:60px;
    border:2px solid #c7d2e5;
    border-radius:12px;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap: var(--zone-gap);
    background:#ffffffd8;
}

.controls { margin-bottom: 15px; }
button {
    padding:8px 12px;
    border-radius:6px;
    border: 1px solid #cbd5e1;
    background:#1f2937;
    color:white;
}
button.secondary {
    background:white;
    color:#111;
}
</style>
</head>
<body>

<h1>Kanaltrianglar</h1>

<div class="controls" style="display:flex; gap:12px; margin:20px;">
  <button id="addTri">+ Ny triangel</button>
  <button class="secondary" id="exportAllPdf">Exportera alla som PDF</button>
</div>

<!-- ======== TRIANGLE AREA ======== -->
<div id="mainArea"></div>

<!-- ======== WORD PANEL RIGHT ======== -->
<div id="wordPanel">
    <div id="panelTitle">Inga trianglar valda</div>

    <button id="addWordBtn" class="secondary">+ Lägg till ord</button>

    <div id="panelWords"></div>
</div>

<script>
/* ===============================
   Konstanter
   =============================== */
const DEFAULT_LABELS = {
  top:   { title: 'Kanalens roll',    subtitle: 'Syfte & placeringsprincip' },
  left:  { title: 'Aktiveringslogik', subtitle: 'När & hur triggas kanalen?' },
  right: { title: 'Omfattning',       subtitle: 'Detaljnivå & förväntat innehåll' }
};

const DEFAULT_WORDS = [
  "Kort och koncist",
  "Fördjupning",
  "Pressmeddelande",
  "Personaliserad",
  "Till ALLA resenärer"
];

let triangles = [];
let activeTri = null;
let AUTOSAVE_KEY = "tri-system-v1";

/* ===============================
   INIT
   =============================== */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("addTri").onclick = () => createTriangle(true);
    document.getElementById("addWordBtn").onclick = addWordToActive;

    const restored = restore();
    if (!restored) createTriangle(true);

    setInterval(save, 2000);
});

/* ===============================
   SKAPA TRIANGEL
   =============================== */
function createTriangle(withDefaults) {
    const id = "tri_" + Date.now();
    const wrapper = document.createElement("div");
    wrapper.className = "tri-block";
    wrapper.dataset.id = id;

    wrapper.innerHTML = `
      <input class="title-input" placeholder="Namn på triangel">
      <div class="triangle-wrap">
        <div class="tri-title-above"></div>
        <div class="triangle">
          <div class="tri-bg"></div>

          <div class="zone-box zone-top">
            <span class="zone-label" contenteditable="true">${DEFAULT_LABELS.top.title}</span>
            <div class="zone-sub" contenteditable="true">${DEFAULT_LABELS.top.subtitle}</div>
            <div class="zone" data-key="top"></div>
          </div>

          <div class="zone-box zone-left">
            <span class="zone-label" contenteditable="true">${DEFAULT_LABELS.left.title}</span>
            <div class="zone-sub" contenteditable="true">${DEFAULT_LABELS.left.subtitle}</div>
            <div class="zone" data-key="left"></div>
          </div>

          <div class="zone-box zone-right">
            <span class="zone-label" contenteditable="true">${DEFAULT_LABELS.right.title}</span>
            <div class="zone-sub" contenteditable="true">${DEFAULT_LABELS.right.subtitle}</div>
            <div class="zone" data-key="right"></div>
          </div>

        </div>
      </div>
    `;

    wrapper.onclick = () => setActiveTriangle(id);
    const titleInput = wrapper.querySelector('.title-input');
    const titleAbove = wrapper.querySelector('.tri-title-above');

    titleInput.addEventListener("input", () => {
        titleAbove.textContent = titleInput.value.trim();
    });

    document.getElementById("mainArea").appendChild(wrapper);

    triangles.push({
        id,
        el: wrapper,
        words: withDefaults ? [...DEFAULT_WORDS] : []
    });

    if (withDefaults) rebuildActiveIf(id, true);

    setActiveTriangle(id);
}

/* ===============================
   AKTIV TRIANGEL
   =============================== */
function setActiveTriangle(id) {
    activeTri = triangles.find(t => t.id === id);
    if (!activeTri) return;

    document.querySelectorAll(".tri-block").forEach(b => {
        b.style.outline = (b.dataset.id === id) ? "2px solid #2563eb" : "none";
    });

    document.getElementById("panelTitle").textContent =
        activeTri.el.querySelector(".title-input").value || "Ingen titel";

    rebuildWordPanel();
}

/* ===============================
   ORDPANEL
   =============================== */
function rebuildWordPanel() {
    const panel = document.getElementById("panelWords");
    panel.innerHTML = "";
    if (!activeTri) return;

    activeTri.words.forEach(w => {
        panel.appendChild(makePill(w));
    });

    setupPanelDrag(panel);
}

/* ===============================
   LÄGG TILL ORD (panel)
   =============================== */
function addWordToActive() {
    if (!activeTri) return;
    const w = prompt("Nytt ord:");
    if (!w) return;
    activeTri.words.push(w.trim());
    rebuildWordPanel();
}

/* ===============================
   SKAPA PILL
   =============================== */
function makePill(text) {
    const p = document.createElement("span");
    p.className = "pill";
    p.textContent = text;
    p.draggable = true;
    return p;
}

/* ===============================
   DRAG & DROP LOGIK
   =============================== */
function setupPanelDrag(panel) {
    panel.querySelectorAll(".pill").forEach(p => {
        p.addEventListener("dragstart", e => {
            e.dataTransfer.setData("text/plain", p.textContent);
            e.dataTransfer.effectAllowed = "move";
        });
    });

    document.querySelectorAll(".zone").forEach(z => {
        z.addEventListener("dragover", e => e.preventDefault());
        z.addEventListener("drop", e => {
            e.preventDefault();
            if (!activeTri) return;
            const word = e.dataTransfer.getData("text/plain");
            activeTri.words = activeTri.words.filter(x => x !== word);
            z.appendChild(makePill(word));
            rebuildWordPanel();
        });
    });
}

/* ===============================
   SPARA & ÅTERSTÄLL
   =============================== */
function save() {
    const data = triangles.map(t => {
        const name = t.el.querySelector(".title-input").value || "";
        const labels = {};
        const subs = {};
        ["top","left","right"].forEach(k => {
            labels[k] = t.el.querySelector(`.zone-${k} .zone-label`).textContent;
            subs[k] = t.el.querySelector(`.zone-${k} .zone-sub`).textContent;
        });
        const zones = {};
        t.el.querySelectorAll(".zone").forEach(z => {
            const key = z.dataset.key;
            zones[key] = [...z.querySelectorAll(".pill")].map(p=>p.textContent);
        });
        return {
            id: t.id,
            name,
            words: t.words,
            labels,
            subs,
            zones
        };
    });

    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
}

function restore() {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (!raw) return false;
    const arr = JSON.parse(raw);

    arr.forEach(t => {
        createTriangle(false);
        const tri = triangles.find(x => x.id === t.id);

        tri.el.querySelector(".title-input").value = t.name;
        tri.el.querySelector(".tri-title-above").textContent = t.name;
        tri.words = t.words;

        ["top","left","right"].forEach(k => {
            tri.el.querySelector(`.zone-${k} .zone-label`).textContent = t.labels[k];
            tri.el.querySelector(`.zone-${k} .zone-sub`).textContent = t.subs[k];
        });

        Object.entries(t.zones).forEach(([k, list]) => {
            const z = tri.el.querySelector(`.zone[data-key="${k}"]`);
            list.forEach(w => z.appendChild(makePill(w)));
        });
    });

    setActiveTriangle(arr[0].id);
    return true;
}

/* ===============================
   PDF EXPORT PER TRIANGEL
   =============================== */
document.getElementById("exportAllPdf").onclick = exportAllPdf;

async function exportAllPdf() {
    const { jsPDF } = window.jspdf;

    for (const t of triangles) {
        const title = t.el.querySelector(".title-input").value || "Triangel";
        const triDiv = t.el.querySelector(".triangle");

        const canvas = await html2canvas(triDiv, {
            backgroundColor: "#ffffff",
            scrollY: -window.scrollY,
            scale: 2
        });

        const img = canvas.toDataURL("image/png");

        const pdf = new jsPDF("p","pt","a4");
        const pageW = pdf.internal.pageSize.getWidth();
        const margin = 36;

        pdf.setFont("helvetica","bold");
        pdf.setFontSize(20);
        pdf.text(title, margin, margin+10);

        const availW = pageW - margin*2;
        const scale = availW / canvas.width;
        const drawW = canvas.width * scale;
        const drawH = canvas.height * scale;

        pdf.addImage(img,"PNG", margin, margin+30, drawW, drawH);

        pdf.save(title.replace(/\s+/g,"_")+".pdf");
    }
}
</script>

</body>
</html>
